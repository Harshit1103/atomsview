<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0612" />
    <title>AtmosView — Weather Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><text y='22' x='5' font-size='18'>🌤</text></svg>" />

    <!-- ① DNS + TCP handshake starts NOW, before JS parses -->
    <link rel="dns-prefetch"  href="https://api.open-meteo.com" />
    <link rel="dns-prefetch"  href="https://air-quality-api.open-meteo.com" />
    <link rel="dns-prefetch"  href="https://nominatim.openstreetmap.org" />
    <link rel="dns-prefetch"  href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch"  href="https://fonts.gstatic.com" />
    <link rel="preconnect"    href="https://api.open-meteo.com" crossorigin />
    <link rel="preconnect"    href="https://air-quality-api.open-meteo.com" crossorigin />
    <link rel="preconnect"    href="https://fonts.googleapis.com" />
    <link rel="preconnect"    href="https://fonts.gstatic.com" crossorigin />

    <!-- ② Fonts load async — NEVER block render.
         `media=print` + onload swap is the fastest non-blocking font pattern. -->
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" />
    </noscript>

    <!-- ③ Instant theme — runs SYNC before first paint, kills FOUC completely -->
    <script>
      (function(){
        var s=localStorage.getItem('atmosview-theme');
        var t=s==='light'||s==='dark'?s:(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
        document.documentElement.classList.add(t);
      })();
    </script>

    <!-- ④ Critical CSS inlined — zero render-blocking, app looks right on first byte.
         System font fallbacks so text renders instantly even before Google Fonts arrive. -->
    <style>
      /* --- Reset --- */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{overflow-x:hidden;scroll-behavior:smooth}

      /* --- System font stacks that look close to our chosen fonts --- */
      :root{
        --f-display: 'Space Mono','Courier New',monospace;
        --f-body:    'IBM Plex Sans','Segoe UI',system-ui,sans-serif;
        --f-mono:    'IBM Plex Mono','Courier New',monospace;
        --bg-dark:#0a0612; --bg-light:#f5f3ff;
        --text-dark:#f0eeff; --text-light:#1e1035;
      }

      /* --- Base body — renders immediately with system fonts --- */
      body{
        background:var(--bg-dark);
        color:var(--text-dark);
        font-family:var(--f-body);
        min-height:100dvh;
        overflow-x:hidden;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
      }
      .light body,.light{background:var(--bg-light)!important;color:var(--text-light)!important}
      html.light{background:var(--bg-light)}
      html.dark, html:not(.light){background:var(--bg-dark)}

      /* --- Root shell --- */
      #root{display:flex;flex-direction:column;min-height:100dvh;position:relative;z-index:1}

      /* --- Boot skeleton: visible immediately on HTML parse, before ANY JS --- */
      #boot{
        position:fixed;inset:0;
        background:#0a0612;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        gap:20px;z-index:9999;
        transition:opacity .28s ease,transform .28s ease;
      }
      html.light #boot{background:#f5f3ff}

      /* Outer glow ring */
      .boot-ring{
        position:relative;width:52px;height:52px;
      }
      .boot-ring::before{
        content:'';position:absolute;inset:0;border-radius:50%;
        border:1px solid rgba(139,92,246,.18);
      }
      .boot-ring::after{
        content:'';position:absolute;inset:-4px;border-radius:50%;
        border:1px solid rgba(139,92,246,.08);
      }
      .boot-spinner{
        position:absolute;inset:0;border-radius:50%;
        border:2px solid transparent;
        border-top-color:#8b5cf6;
        border-right-color:rgba(232,121,249,.4);
        animation:bspin .75s linear infinite;
        filter:drop-shadow(0 0 8px rgba(139,92,246,.7));
      }
      .boot-logo{
        font-family:'Courier New',monospace;
        font-size:13px;font-weight:700;letter-spacing:.15em;
        color:rgba(167,139,250,.5);
      }
      .boot-sub{
        font-family:'Courier New',monospace;
        font-size:9px;letter-spacing:.2em;
        color:rgba(167,139,250,.25);margin-top:-14px;
      }
      html.light .boot-logo{color:rgba(109,40,217,.45)}
      html.light .boot-sub {color:rgba(109,40,217,.2)}
      @keyframes bspin{to{transform:rotate(360deg)}}

      /* Fade-out class applied by JS */
      #boot.done{opacity:0;pointer-events:none}
    </style>
  </head>
  <body>
    <!-- Visible on first byte — no JS needed -->
    <div id="boot">
      <div class="boot-ring">
        <div class="boot-spinner"></div>
      </div>
      <div class="boot-logo">ATMOSVIEW</div>
      <div class="boot-sub">WEATHER INTELLIGENCE</div>
    </div>

    <div id="root"></div>

    <!-- Module script — deferred automatically by browser -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
